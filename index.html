<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turnier-Auswahl | Spieltag-Info</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="card hero">
      <div class="hero-headline">
        <div>
          <h1>Turnier-Auswahl</h1>
          <p>Finde laufende, vergangene und kommende Turniere in deiner Nähe – inklusive Datumsauswahl, Direktlink und QR-Code.</p>
        </div>
      </div>
    </header>

    <main>
      <section class="card selector-search">
        <h2>Suche</h2>
        <p class="hint" id="locationStatus">Standort wird für Vorschläge genutzt (optional).</p>
        <div class="date-filter">
          <label for="tournamentDate">Datum wählen</label>
          <input id="tournamentDate" type="date" aria-label="Turnierdatum auswählen" />
        </div>
        <div class="autocomplete-wrap">
          <input id="tournamentSearch" type="search" placeholder="Turnier, Ort oder Datum suchen" autocomplete="off" aria-label="Turniersuche" />
          <div id="tournamentSuggestions" class="autocomplete-list" role="listbox" aria-label="Turnier-Vorschläge"></div>
        </div>
      </section>

      <section class="card">
        <h2>Vorschläge</h2>
        <div id="tournamentCards" class="tournament-grid"></div>
      </section>
    </main>

    <footer><small>GitHub Pages kompatible, statische Website.</small></footer>

    <script type="module" src="script.js"></script>
  </body>
</html>
