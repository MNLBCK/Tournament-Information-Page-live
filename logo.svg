<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Turnierlogo mit Pokal und Fußball</title>
  <desc id="desc">Ein oben offener Pokal mit einem Fußball oben, auf einem grün-weißen Fußballfeld.</desc>

  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9d976"/>
      <stop offset="50%" stop-color="#e0ac2b"/>
      <stop offset="100%" stop-color="#b8830e"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ea44f"/>
      <stop offset="100%" stop-color="#1f7a39"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <!-- r=71 = ball radius (74) minus half stroke-width (3): clips patches to inner edge of stroke -->
    <clipPath id="ballClip">
      <circle cx="0" cy="0" r="71"/>
    </clipPath>
  </defs>

  <rect width="1200" height="800" fill="#eaf5ea"/>

  <!-- Fußballfeld -->
  <rect x="80" y="130" width="1040" height="600" rx="24" fill="url(#field)"/>
  <rect x="80" y="130" width="1040" height="600" rx="24" fill="none" stroke="#ffffff" stroke-width="10"/>
  <line x1="600" y1="130" x2="600" y2="730" stroke="#ffffff" stroke-width="8"/>
  <circle cx="600" cy="430" r="88" fill="none" stroke="#ffffff" stroke-width="8"/>
  <rect x="80" y="300" width="120" height="260" fill="none" stroke="#ffffff" stroke-width="8"/>
  <rect x="1000" y="300" width="120" height="260" fill="none" stroke="#ffffff" stroke-width="8"/>

  <!-- Pokalgruppe -->
  <g filter="url(#shadow)">
    <!-- Pokalkorpus (oben offen) -->
    <path d="M460 240 L740 240 L700 510 Q600 560 500 510 Z" fill="url(#gold)" stroke="#8a6205" stroke-width="8"/>

    <!-- offene obere Kante -->
    <line x1="460" y1="240" x2="740" y2="240" stroke="#8a6205" stroke-width="10"/>

    <!-- Henkel links -->
    <path d="M460 280 Q390 300 400 380 Q410 455 485 455" fill="none" stroke="#b8830e" stroke-width="18" stroke-linecap="round"/>
    <!-- Henkel rechts -->
    <path d="M740 280 Q810 300 800 380 Q790 455 715 455" fill="none" stroke="#b8830e" stroke-width="18" stroke-linecap="round"/>

    <!-- Stiel und Sockel -->
    <rect x="560" y="510" width="80" height="80" rx="16" fill="#c8921e" stroke="#8a6205" stroke-width="6"/>
    <rect x="500" y="585" width="200" height="40" rx="10" fill="#c8921e" stroke="#8a6205" stroke-width="6"/>
    <rect x="470" y="622" width="260" height="58" rx="12" fill="#6f5231" stroke="#3d2a16" stroke-width="6"/>
  </g>

  <!-- Fußball oben im offenen Pokal -->
  <g transform="translate(600 220)">
    <circle r="74" fill="#ffffff" stroke="#1f1f1f" stroke-width="6"/>
    <g clip-path="url(#ballClip)">
      <polygon points="0,-27 25,-9 16,20 -16,20 -25,-9" fill="#1f1f1f"/>
      <polygon points="-44,-44 -24,-24 -42,-4 -62,-20" fill="#1f1f1f"/>
      <polygon points="44,-44 24,-24 42,-4 62,-20" fill="#1f1f1f"/>
      <polygon points="-40,34 -14,28 -8,54 -30,64" fill="#1f1f1f"/>
      <polygon points="40,34 14,28 8,54 30,64" fill="#1f1f1f"/>
    </g>
  </g>
</svg>
